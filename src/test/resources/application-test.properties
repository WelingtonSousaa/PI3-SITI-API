spring.datasource.url=jdbc:h2:mem:sititestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Inicializar o banco de dados
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:insert_mock_data.sql

# JWT Secret para testes
jwt.secret=TestSecretKeyThatIsAtLeast32BytesLongForHS256Algorithm
jwt.expiration=86400000

# Mock Mail Sender
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test